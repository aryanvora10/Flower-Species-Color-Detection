<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 Flower Detective — Species & Color AI</title>
  <meta name="description" content="Upload or drag-and-drop a flower image to detect its species and accurate colors using AI." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ───── Reset & Base ───── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #fafbfc;
      --surface:   #ffffff;
      --glass:     rgba(255, 255, 255, 0.9);
      --glass-brd: rgba(0, 0, 0, 0.08);
      --text:      #0f172a;
      --text-dim:  #475569;
      --accent:    #8b5cf6;
      --accent2:   #ec4899;
      --accent3:   #3b82f6;
      --success:   #10b981;
      --radius:    16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* floating gradient blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      opacity: .15; /* Much softer for light theme */
      z-index: -1;
    }
    body::before { width: 500px; height: 500px; background: var(--accent);  top: -100px; left: -100px; }
    body::after  { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; }

    /* ───── Layout ───── */
    .container { max-width: 960px; margin: 0 auto; padding: 40px 24px 60px; }

    h1 {
      text-align: center;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .subtitle { text-align: center; color: var(--text-dim); font-size: .95rem; margin-bottom: 36px; }

    /* ───── Glass Card ───── */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-brd);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 32px;
      margin-bottom: 28px;
      transition: transform .25s, box-shadow .25s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,.08); }

    /* ───── Drop Zone ───── */
    #dropZone {
      border: 2px dashed var(--glass-brd);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .3s, background .3s;
      position: relative;
    }
    #dropZone.hover { border-color: var(--accent); background: rgba(168,85,247,.08); }
    #dropZone .icon { font-size: 3rem; margin-bottom: 12px; }
    #dropZone p { color: var(--text-dim); font-size: .95rem; }
    #dropZone .browse-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 40px;
      color: #fff; font-weight: 600; font-size: .9rem;
      cursor: pointer;
      transition: opacity .2s;
    }
    #dropZone .browse-btn:hover { opacity: .85; }
    #fileInput { display: none; }

    /* ───── Preview ───── */
    #previewSection { display: none; text-align: center; margin-top: 20px; }
    #previewSection img {
      max-height: 280px;
      border-radius: 12px;
      border: 1px solid var(--glass-brd);
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
    }
    #fileName { margin-top: 10px; color: var(--text-dim); font-size: .85rem; }

    /* ───── Analyze Button ───── */
    #analyzeBtn {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      color: #fff;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    #analyzeBtn:hover { transform: scale(1.02); box-shadow: 0 6px 28px rgba(59,130,246,.35); }
    #analyzeBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* spinner */
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ───── Results ───── */
    #resultsSection { display: none; animation: fadeUp .5s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .result-header { text-align: center; margin-bottom: 24px; }
    .species-badge {
      display: inline-block;
      padding: 8px 24px;
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: capitalize;
      border-radius: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      letter-spacing: .5px;
    }
    .confidence { margin-top: 8px; color: var(--success); font-weight: 600; font-size: 1rem; }

    .images-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .images-row { grid-template-columns: 1fr; } }

    .img-card { text-align: center; }
    .img-card img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--glass-brd);
    }
    .img-card .label { margin-top: 8px; font-size: .8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

    /* single dominant color */
    .color-section { text-align: center; }
    .swatch {
      width: 120px; height: 120px;
      border-radius: 20px;
      border: 2px solid var(--glass-brd);
      box-shadow: 0 6px 24px rgba(0,0,0,.15);
      margin: 0 auto 10px;
    }
    .swatch:hover { transform: scale(1.08); }
    .color-section .cname { font-size: 1.1rem; font-weight: 700; }
    /* ───── Error ───── */
    .error-msg { color: #ef4444; text-align: center; margin-top: 12px; font-size: .9rem; }

    /* ───── Footer ───── */
    footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: .75rem; }
  </style>
</head>
<body>

<div class="container">
  <h1>🌸 Flower Detective</h1>
  <p class="subtitle">Drop or browse a flower image — AI detects the species &amp; true colors instantly.</p>

  <!-- Upload Card -->
  <div class="card">
    <div id="dropZone">
      <div class="icon">📷</div>
      <p>Drag &amp; drop your flower image here</p>
      <button class="browse-btn" id="browseBtn">Browse Files</button>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <div id="previewSection">
      <img id="previewImg" alt="Preview" />
      <div id="fileName"></div>
    </div>

    <button id="analyzeBtn">🔍 Analyze Flower</button>
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <!-- Results Card -->
  <div id="resultsSection" class="card">
    <div class="result-header">
      <span class="species-badge" id="speciesName"></span>
      <div class="confidence" id="confidenceVal"></div>
    </div>

    <div class="images-row">
      <div class="img-card">
        <img id="origImg" alt="Original" />
        <div class="label">Original Image</div>
      </div>
      <div class="img-card">
        <img id="cutoutImg" alt="Flower Cutout" />
        <div class="label">Segmented Flower</div>
      </div>
    </div>

    <h3 style="text-align:center; margin-bottom:14px; font-weight:600; font-size:.95rem; color:var(--text-dim);">DOMINANT COLOR</h3>
    <div class="color-section" id="colorSection"></div>
  </div>
</div>

<footer>Powered by EfficientNetB0 · GrabCut · K-Means &nbsp;|&nbsp; Built with Flask</footer>

<script>
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const browseBtn   = document.getElementById('browseBtn');
  const previewSec  = document.getElementById('previewSection');
  const previewImg  = document.getElementById('previewImg');
  const fileNameEl  = document.getElementById('fileName');
  const analyzeBtn  = document.getElementById('analyzeBtn');
  const errorMsg    = document.getElementById('errorMsg');
  const resultsSec  = document.getElementById('resultsSection');

  let selectedFile = null;

  // ─── Browse button ───
  browseBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  // ─── Drag & drop ───
  ['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('hover'); }));
  ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('hover'); }));
  dropZone.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) { showError('Please select an image file.'); return; }
    selectedFile = file;
    errorMsg.textContent = '';
    resultsSec.style.display = 'none';

    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      fileNameEl.textContent = file.name;
      previewSec.style.display = 'block';
      analyzeBtn.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  // ─── Analyze ───
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    analyzeBtn.disabled = true;
    analyzeBtn.innerHTML = '<span class="spinner"></span> Analyzing…';
    errorMsg.textContent = '';
    resultsSec.style.display = 'none';

    const form = new FormData();
    form.append('file', selectedFile);

    try {
      const res = await fetch('/predict', { method: 'POST', body: form });
      if (!res.ok) { const j = await res.json(); throw new Error(j.error || 'Server error'); }
      const data = await res.json();
      showResults(data);
    } catch (err) {
      showError(err.message);
    } finally {
      analyzeBtn.disabled = false;
      analyzeBtn.innerHTML = '🔍 Analyze Flower';
    }
  });

  function showResults(data) {
    document.getElementById('speciesName').textContent = '🌺 ' + data.species;
    document.getElementById('confidenceVal').textContent = 'Confidence: ' + data.confidence.toFixed(1) + '%';
    document.getElementById('origImg').src = data.original_image;
    document.getElementById('cutoutImg').src = data.cutout_image;

    const sec = document.getElementById('colorSection');
    const c = data.dominant_color;
    sec.innerHTML = `
      <div class="swatch" style="background:${c.hex};"></div>
      <div class="cname">${c.name}</div>
    `;

    resultsSec.style.display = 'block';
    resultsSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(msg) { errorMsg.textContent = '⚠ ' + msg; }
</script>

</body>
</html>
